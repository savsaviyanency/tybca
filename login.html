<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #0f172a, #1e1b4b);
            overflow: hidden;
            position: relative;
        }

        /* --- Background Animation Elements --- */
        .background-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .shape {
            position: absolute;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.05));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 12s infinite ease-in-out;
            transition: transform 0.5s ease;
        }

        .shape:hover {
            transform: scale(1.2) rotate(15deg);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(236, 72, 153, 0.2));
        }

        .shape1 {
            width: 250px;
            height: 250px;
            top: 15%;
            left: 15%;
            animation-delay: 0s;
        }

        .shape2 {
            width: 300px;
            height: 300px;
            bottom: 10%;
            right: 15%;
            animation-delay: -3s;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; /* Blob shape */
        }

        .shape3 {
            width: 150px;
            height: 150px;
            bottom: 20%;
            left: 25%;
            animation-delay: -6s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-40px) rotate(180deg);
            }
        }

        /* --- Login Card --- */
        .login-container {
            position: relative;
            width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            z-index: 10;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        /* --- Input Styles --- */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            outline: none;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        /* Label Animation */
        .input-group label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        /* Input Focus Effects */
        .input-group input:focus,
        .input-group input:valid {
            background: rgba(255, 255, 255, 0.12);
            border-color: #6366f1;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -10px;
            left: 10px;
            font-size: 0.85rem;
            color: #6366f1;
            background: #151636;
            padding: 0 6px;
            border-radius: 4px;
        }

        /* --- Remember & Forgot --- */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .options a {
            color: #6366f1;
            text-decoration: none;
            transition: color 0.3s;
        }

        .options a:hover {
            color: #818cf8;
            text-decoration: underline;
        }

        /* --- Button Style --- */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn:hover {
            background: linear-gradient(90deg, #4f46e5, #9333ea);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* --- Signup Link --- */
        .signup-link {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .signup-link a {
            color: #a855f7;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="background-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>

    <div class="login-container">
        <h2>Welcome Back</h2>
        <form action="#">
            <div class="input-group">
                <input type="text" required>
                <label>Username</label>
            </div>
            
            <div class="input-group">
                <input type="password" required>
                <label>Password</label>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox"> Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn">Sign In</button>

            <div class="signup-link">
                Don't have an account? <a href="#">Register</a>
            </div>
        </form>
    </div>

</body>
</html>
